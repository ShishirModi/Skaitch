<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skaitch Canvas</title>
    <!-- Streamlit component library -->
    <script src="https://unpkg.com/streamlit-component-lib@1.3.0/dist/streamlit.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; }
        #canvas-container { position: relative; width: 100%; height: 100%; }
        canvas { position: absolute; top: 0; left: 0; }
        #bg-canvas { z-index: 1; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        #draw-canvas { z-index: 2; border-radius: 8px; cursor: crosshair; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="bg-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>
    </div>
    <script>
        const bgCanvas = document.getElementById("bg-canvas");
        const drawCanvas = document.getElementById("draw-canvas");
        const bgCtx = bgCanvas.getContext("2d");
        const drawCtx = drawCanvas.getContext("2d", { willReadFrequently: true });
        
        let isDrawing = false;
        let brushSize = 20;
        let strokeColor = "#F59E0B";
        let initializedImageSrc = null;

        function sendDataToPython() {
            const dataUrl = drawCanvas.toDataURL("image/png");
            Streamlit.setComponentValue(dataUrl);
            Streamlit.setFrameHeight(drawCanvas.height);
        }

        function getMousePos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        drawCanvas.addEventListener("mousedown", (e) => {
            isDrawing = true;
            const pos = getMousePos(drawCanvas, e);
            drawCtx.beginPath();
            drawCtx.moveTo(pos.x, pos.y);
        });
        
        drawCanvas.addEventListener("mousemove", (e) => {
            if (isDrawing) {
                const pos = getMousePos(drawCanvas, e);
                drawCtx.lineTo(pos.x, pos.y);
                drawCtx.strokeStyle = strokeColor;
                drawCtx.lineWidth = brushSize;
                drawCtx.lineCap = "round";
                drawCtx.lineJoin = "round";
                drawCtx.stroke();
            }
        });
        
        const stopDrawing = () => {
            if (isDrawing) {
                isDrawing = false;
                sendDataToPython();
            }
        };

        drawCanvas.addEventListener("mouseup", stopDrawing);
        drawCanvas.addEventListener("mouseout", stopDrawing);

        function onRender(event) {
            const data = event.detail.args;
            brushSize = data.brush_size || 20;
            strokeColor = data.stroke_color || "#F59E0B";
            const reqWidth = data.width || 800;
            const reqHeight = data.height || 600;
            
            let resizeNeeded = (bgCanvas.width !== reqWidth || bgCanvas.height !== reqHeight);
            
            if (resizeNeeded) {
                bgCanvas.width = reqWidth;
                bgCanvas.height = reqHeight;
                drawCanvas.width = reqWidth;
                drawCanvas.height = reqHeight;
            }
            
            // Only draw background image once or if the image prop changes
            if (data.bg_image && (resizeNeeded || initializedImageSrc !== data.bg_image)) {
                initializedImageSrc = data.bg_image;
                const img = new Image();
                img.onload = () => {
                    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                    bgCtx.drawImage(img, 0, 0, reqWidth, reqHeight);
                    Streamlit.setFrameHeight(reqHeight);
                };
                img.src = data.bg_image;
            }
            
            Streamlit.setFrameHeight(reqHeight);
        }

        // Attach listener and setup
        Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
        Streamlit.setComponentReady();
    </script>
</body>
</html>
